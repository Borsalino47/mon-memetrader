<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jeu de Tri de Déchets - CFA</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="login-container">
        <h2>Connexion</h2>
        <input type="text" id="username" placeholder="Entrez votre pseudo" required>
        <select id="profession">
            <option value="">Sélectionnez votre métier</option>
            <option value="Boulanger">Boulanger</option>
            <option value="Pâtissier">Pâtissier</option>
            <option value="Cuisinier">Cuisinier</option>
            <option value="Serveur">Serveur</option>
            <option value="Mécanicien">Mécanicien</option>
            <option value="Coiffeur">Coiffeur</option>
            <!-- Ajoutez d'autres métiers au besoin -->
        </select>
        <button id="login-btn">Jouer</button>
    </div>

    <div id="game-container" style="display:none;">
        <div id="game-header">
            <div>Joueur: <span id="player-name"></span></div>
            <div>Score: <span id="score">0</span></div>
            <div>Temps: <span id="timer">60</span>s</div>
        </div>
        <div id="waste-area">
            <div id="waste-item" draggable="true"></div>
        </div>
        <div id="bins-container">
            <div class="bin" data-bin-type="verre">Verre</div>
            <div class="bin" data-bin-type="papier">Papier</div>
            <div class="bin" data-bin-type="plastique">Plastique</div>
            <div class="bin" data-bin-type="organique">Organique</div>
            <div class="bin" data-bin-type="metal">Métal</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
